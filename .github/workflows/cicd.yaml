name: CI Spring Boot

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # On ajoute explicitement les permissions requises pour les Checks et les Pull Requests
    permissions:
      checks: write
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install dependencies
        run: mvn package -DskipTests

      # Exécute les tests ET génère les fichiers HTML
      - name: Run Tests & Generate Reports
        id: run_tests
        continue-on-error: true
        run: mvn test

      # Nouvelle version mise à jour (ScalableCapital au lieu de scacap)
      - name: Publish Test Report
        uses: ScalableCapital/action-surefire-report@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          check_name: "Rapport des Tests Unitaires"

      # Sauvegarde des rapports HTML complets dans les artefacts de GitHub
      - name: Upload HTML Reports Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-html-reports
          path: |
            target/site/surefire-report.html
            target/site/jacoco/
          retention-days: 5

      # Vérification finale du statut
      - name: Check final status
        if: steps.run_tests.outcome == 'failure'
        run: |
          echo "❌ Certains tests unitaires ont échoué. Consultez l'onglet 'Checks' ou téléchargez les artefacts."
          exit 1