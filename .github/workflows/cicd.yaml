name: CI Spring Boot

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Permet aux actions de poster des commentaires si PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install dependencies
        run: mvn package -DskipTests

      # Exécute les tests ET génère les fichiers HTML de Surefire + JaCoCo
      # Si un test échoue, on continue pour publier le rapport HTML !
      - name: Run Tests & Generate Reports
        id: run_tests
        continue-on-error: true
        run: mvn test

      # Action communautaire pour publier le rapport HTML des tests de manière lisible
      - name: Publish Test Report
        uses: scacap/action-surefire-report@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          check_name: "Rapport des Tests Unitaires"

      # Optionnel : Sauvegarder les rapports HTML complets dans les artefacts de GitHub
      # Vous pourrez les télécharger en format .zip sur la page du build
      - name: Upload HTML Reports Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-html-reports
          path: |
            target/site/surefire-report.html
            target/site/jacoco/
          retention-days: 5

      # Étape finale de contrôle de sécurité pour bloquer le build s'il y a eu un échec
      - name: Check final status
        if: steps.run_tests.outcome == 'failure'
        run: |
          echo "❌ Certains tests unitaires ont échoué. Consultez l'onglet 'Checks' ou téléchargez les artefacts."
          exit 1