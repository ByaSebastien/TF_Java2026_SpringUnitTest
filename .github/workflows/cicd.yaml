name: CI Spring Boot

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install dependencies
        run: mvn package -DskipTests

      # 1. On lance les tests normalement.
      # Si un test échoue, cette étape s'arrête ici et marque l'étape comme "Failed".
      - name: Run Tests
        id: run_tests
        run: mvn test
        continue-on-error: true

      # 2. Cette étape ne se déclenche QUE si l'étape précédente "Run Tests" a échoué.
      - name: Log On Failure
        if: failure() && steps.run_tests.outcome == 'failure'
        shell: bash
        run: |
          echo "❌ Un ou plusieurs tests unitaires ont échoué !"
          echo "### ⚠️ Alerte Tests" >> $GITHUB_STEP_SUMMARY
          echo "La suite de tests ne s'est pas terminée avec succès. Veuillez vérifier les logs ci-dessus ou les rapports Surefire pour identifier les régressions." >> $GITHUB_STEP_SUMMARY

      # 3. Cette étape ne se déclenche QUE si tous les tests ont réussi.
      - name: Log On Success
        if: success()
        shell: bash
        run: |
          echo "✅ Tous les tests sont passés avec succès !"
          echo "### 🎉 Succès" >> $GITHUB_STEP_SUMMARY
          echo "Tous les tests unitaires ont été validés." >> $GITHUB_STEP_SUMMARY